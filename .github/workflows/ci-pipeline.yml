# 1. ¿CÓMO SE LLAMA NUESTRO ROBOT?
name: Integracion Continua Nivel 5

# 2. ¿CUÁNDO SE DESPIERTA NUESTRO ROBOT?
on: 
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

# 3. ¿QUÉ TRABAJOS (JOBS) HACE NUESTRO ROBOT?
jobs:
  build-and-test:
    # 4. ¿QUÉ COMPUTADORA LE PEDIMOS PRESTADA A GITHUB?
    runs-on: ubuntu-latest

    steps:
      # paso A: Descargar código fuente
      - name: Descargar código fuente
        uses: actions/checkout@v4
      
      # paso B: Instalar .NET 8
      - name: Instalar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      # paso C: Restaurar dependencias (Ajustado a la carpeta GestionITM)
      - name: Restaurar dependencias
        run: dotnet restore GestionITM/GestionITM.slnx
      
      # paso D: Compilar código (Ajustado a la carpeta GestionITM)
      - name: Compilar código
        run: dotnet build GestionITM/GestionITM.slnx --configuration Release --no-restore
      
      # paso E: Ejecutar pruebas unitarias
      - name: Ejecutar pruebas unitarias
        run: dotnet test GestionITM/GestionITM.slnx --configuration Release --no-build --verbosity normal
      
      # paso F: Validar construcción de imagen de Docker (Ajustado a tu ruta real)
      - name: Validar construcción de imagen de Docker
        run: docker build -t gestion-itm-api:latest -f GestionITM/Dockerfile .